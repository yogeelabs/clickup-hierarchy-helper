<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>ClickUp Helper Basic Fixture</title>
    <link rel="stylesheet" href="../../content.css">
    <style>
      body { font-family: sans-serif; }
      aside { width: 320px; }
      [data-chh-row] {
        align-items: center;
        border: 1px solid #ddd;
        display: flex;
        margin: 4px 0;
        min-height: 28px;
        padding: 4px 8px;
      }
      .children[hidden] { display: none; }
      [data-chh-row][hidden] { display: none; }
      a { color: inherit; text-decoration: none; }
    </style>
  </head>
  <body>
    <aside data-testid="sidebar">
      <div data-chh-row data-chh-kind="space" aria-expanded="true">Example Workspace</div>
      <div data-chh-row data-chh-kind="folder" aria-expanded="false">
        <button class="toggle" type="button" aria-expanded="false">›</button>
        Example Project Alpha
      </div>
      <div class="children" hidden>
        <a data-chh-row data-chh-kind="list" href="#alpha-tasks">Tasks</a>
      </div>
      <div data-chh-row data-chh-kind="folder" aria-expanded="false">
        <button class="toggle" type="button" aria-expanded="false">›</button>
        Example Project Beta
      </div>
      <div class="children" hidden>
        <a data-chh-row data-chh-kind="list" href="#beta-tasks">Tasks</a>
      </div>
    </aside>

    <script>
      document.addEventListener("click", (event) => {
        const space = event.target.closest("[data-chh-kind='space']");
        if (space) {
          const expanded = space.getAttribute("aria-expanded") === "true";
          space.setAttribute("aria-expanded", String(!expanded));
          for (const row of [...document.querySelectorAll("[data-chh-kind='folder'], .children")]) {
            row.hidden = expanded;
          }
          return;
        }

        const toggle = event.target.closest(".toggle");
        if (!toggle) return;
        const folder = toggle.closest("[data-chh-kind='folder']");
        const children = folder.nextElementSibling;
        const expanded = folder.getAttribute("aria-expanded") === "true";
        folder.setAttribute("aria-expanded", String(!expanded));
        toggle.setAttribute("aria-expanded", String(!expanded));
        children.hidden = expanded;
      });
    </script>
    <script src="../../content.js"></script>
  </body>
</html>
